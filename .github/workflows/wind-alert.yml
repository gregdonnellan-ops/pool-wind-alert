name: Wind Alert for Pool Umbrellas

on:
  schedule:
    - cron: '*/30 12-23 * * *'  # 7am-6pm Central (12:00-23:30 UTC)
    - cron: '*/30 0-3 * * *'    # 7pm-10pm Central (00:00-03:00 UTC next day)
  workflow_dispatch:  # allows manual testing

jobs:
  check-wind:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests
      - name: Check wind and notify
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python check_wind.py
